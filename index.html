<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Logística - Inditex</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #09090b;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui;
            overflow: hidden;
        }

        /* Base fixa estilo TV */
        #dashboard-root {
            width: 1920px;
            height: 1080px;
            transform-origin: top left;
            transition: filter 0.3s ease;
        }

        /* Cards */
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        /* Header dos Cards */
        .card-header {
            color: #a1a1aa;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* Textos */
        .texto-gigante {
            font-size: clamp(2.5rem, 4vw, 4.5rem);
            font-weight: 800;
        }
        .texto-medio {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .blur-bg {
            filter: blur(8px);
            pointer-events: none;
        }

        /* Transição suave para mudança de marca */
        #dashboard-title {
            transition: color 0.5s ease;
        }
    </style>
</head>

<body>

<!-- MODAL INICIAL (SETUP DE DADOS) -->
<div id="setupModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity duration-300">
    <div class="bg-[#18181b] border border-[#27272a] rounded-2xl p-8 max-w-lg w-full flex flex-col items-center gap-6 shadow-2xl">

        <div class="bg-[#27272a] p-4 rounded-full">
            <svg class="w-10 h-10 text-[#00E5FF]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
        </div>

        <div class="text-center">
            <h2 class="text-2xl font-bold text-white mb-2">Setup do Dashboard</h2>
            <p class="text-[#a1a1aa] text-sm">Nenhum dado encontrado. Faça upload do <span class="text-[#00E5FF] font-semibold">meta.json</span> e dos arquivos CSV (<span class="text-white">zh-BANCADAS</span>, <span class="text-white">zsur-BANCADAS</span>, <span class="text-white">bsk-BANCADAS</span>).</p>
        </div>

        <label class="w-full bg-[#0ea5e9] hover:bg-[#0284c7] text-white font-bold py-3 px-6 rounded-xl cursor-pointer transition-colors flex items-center justify-center gap-2 shadow-lg">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Selecionar Arquivos
            <input type="file" id="fileInputModal" accept=".csv, .json" multiple class="hidden">
        </label>
    </div>
</div>

<!-- PAINEL DE CONTROLE FLUTUANTE (Canto Superior Direito) -->
<div class="fixed top-4 right-4 z-50 flex gap-3 opacity-20 hover:opacity-100 transition-opacity duration-300" id="controlPanel">

    <label class="bg-[#18181b] border border-[#27272a] hover:bg-[#27272a] cursor-pointer text-[#a1a1aa] hover:text-white px-4 py-2 rounded-lg font-semibold transition-all flex items-center gap-2 shadow-lg">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
        Atualizar Dados
        <input type="file" id="fileInputHeader" accept=".csv, .json" multiple class="hidden">
    </label>

    <button onclick="toggleFullscreen()" class="bg-[#18181b] border border-[#27272a] hover:bg-[#27272a] text-[#a1a1aa] hover:text-white px-4 py-2 rounded-lg font-semibold transition-all flex items-center gap-2 shadow-lg">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
        Tela Cheia
    </button>
</div>

<!-- CONTAINER PRINCIPAL DO DASHBOARD -->
<div id="dashboard-root" class="blur-bg">

    <div class="h-full w-full p-4 flex flex-col gap-4">

        <!-- CABEÇALHO COM RELÓGIO E NOME DA MARCA -->
        <div class="flex justify-between items-center px-4 shrink-0">
            <h1 id="dashboard-title" class="text-3xl font-bold text-[#a1a1aa] uppercase tracking-widest">Painel Logístico - Setup</h1>
            <div id="clock" class="text-4xl font-bold text-white tracking-widest font-mono">00:00:00</div>
        </div>

        <!-- TOPO -->
        <div class="grid grid-cols-2 gap-4 h-[42%] shrink-0">

            <!-- ESQUERDA -->
            <div class="grid grid-cols-2 gap-4">

                <!-- PRODUÇÃO -->
                <div class="card">
                    <div class="card-header">PRODUÇÃO</div>
                    <div class="relative flex-1">
                        <canvas id="chartProd"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-2">
                            <span id="real" class="texto-gigante text-white">0</span>
                            <span id="meta" class="texto-medio text-gray-400">/ 0</span>
                        </div>
                    </div>
                </div>

                <!-- PEÇAS PENDENTES -->
                <div class="card">
                    <div class="card-header">PEÇAS PENDENTES</div>
                    <div class="relative flex-1">
                        <canvas id="chartBacklog"></canvas>
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none mt-2">
                            <span id="backlog" class="texto-gigante text-white">0</span>
                        </div>
                    </div>
                </div>

            </div>

            <!-- TURNOS -->
            <div class="card">
                <div class="card-header">TURNOS</div>
                <div class="flex-1">
                    <canvas id="chartTurnos"></canvas>
                </div>
            </div>

        </div>

        <!-- BAIXO -->
        <div class="card flex-1">
            <div class="card-header">HORÁRIO</div>
            <div class="flex-1">
                <canvas id="chartHoras"></canvas>
            </div>
        </div>

    </div>
</div>

<script>
    Chart.register(ChartDataLabels);
    Chart.defaults.color = '#a1a1aa';
    Chart.defaults.font.family = "'Segoe UI', sans-serif";

    // ================= RELÓGIO EM TEMPO REAL =================
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ================= ESTADO SEPARADO POR MARCA =================
    let currentBrand = 'ZH'; // Inicia com Zara Home. Pode ser 'ZH' ou 'BSK'

    // Metas
    let metaTotal_zh = 0;
    let metaTotal_bsk = 0;

    // Backlogs
    let backlog_zh = 0;
    let backlog_bsk = 0;

    // Configuração de Horas e Percentuais padrão
    let horasChaves = ["6-7h", "7-8h", "8-9h", "9-10h", "10-11h", "11-12h", "12-13h", "13-14h", "14-15h", "15-16h", "16-17h", "17-18h", "18-19h", "19-20h", "20-21h", "21-22h"];
    let distribuicaoPercentual = {
        "6-7h": 0.07, "7-8h": 0.09, "8-9h": 0.09, "9-10h": 0.09, "10-11h": 0.09, "11-12h": 0.045, "12-13h": 0.045, "13-14h": 0.09, "14-15h": 0.03, "15-16h": 0.06, "16-17h": 0.06, "17-18h": 0.06, "18-19h": 0.03, "19-20h": 0.03, "20-21h": 0.06, "21-22h": 0.06
    };

    // Arrays de Produção
    let realizado_zh = new Array(horasChaves.length).fill(0);
    let realizado_bsk = new Array(horasChaves.length).fill(0);

    // Memória bruta dos CSVs subidos
    let dadosArquivosCsv = {};

    // Cores Neon e Base
    const verde = '#00E676';
    const vermelho = '#FF3D00';
    const azul = '#00E5FF';
    const cinza = '#27272a';
    const branco = '#FFFFFF';
    const amarelo = '#FFEA00';
    const fucsia = '#E040FB'; // Cor BSK destaque opcional se quiser usar

    // ================= INSTANCIANDO GRÁFICOS VAZIOS =================
    let chartProd = new Chart(document.getElementById('chartProd'), {
        type: 'doughnut',
        data: { datasets: [{ data: [0, 1], backgroundColor: [verde, cinza], cutout: '80%', borderWidth: 0 }] },
        options: { responsive:true, maintainAspectRatio:false, plugins: { datalabels: { display: false }, tooltip: { enabled: false } } }
    });

    let chartBacklog = new Chart(document.getElementById('chartBacklog'), {
        type: 'doughnut',
        data: { datasets: [{ data: [0, 1], backgroundColor: [branco, cinza], cutout: '80%', borderWidth: 0 }] },
        options: { responsive:true, maintainAspectRatio:false, plugins: { datalabels: { display: false }, tooltip: { enabled: false } } }
    });

    let chartTurnos = new Chart(document.getElementById('chartTurnos'), {
        type: 'bar',
        data: {
            labels:['T1 (06-14h)', 'T2 (14-22h)'],
            datasets:[
                { label: 'Meta', data: [0, 0], backgroundColor: azul+'40', barPercentage: 0.8, categoryPercentage: 0.5, borderRadius: 4 },
                { label: 'Real', data: [0, 0], backgroundColor: [cinza, cinza], barPercentage: 0.8, categoryPercentage: 0.5, borderRadius: 4 }
            ]
        },
        options:{
            indexAxis:'y', responsive:true, maintainAspectRatio:false,
            layout: { padding: { right: 50 } },
            scales: { x: { display: false }, y: { grid: { display: false }, ticks: { font: { size: 16, weight: 'bold' }, color: '#fff' } } },
            plugins: {
                legend: { display: false },
                datalabels: { anchor: 'end', align: 'right', color: '#fff', font: { weight: 'bold', size: 16 }, formatter: v => v===0 ? '' : Math.round(v) }
            }
        }
    });

    let chartHoras = new Chart(document.getElementById('chartHoras'), {
        type: 'bar',
        data: {
            labels: horasChaves,
            datasets:[
                { label: 'Meta', data: [], backgroundColor: azul+'33', borderColor: azul, borderWidth: 1, borderRadius: 4 },
                { label: 'Real', data: [], backgroundColor: cinza, borderRadius: 4 }
            ]
        },
        options:{
            responsive:true, maintainAspectRatio:false,
            layout: { padding: { top: 30 } },
            scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: { size: 14 } } } },
            plugins:{
                legend: { display: false },
                datalabels: {
                    anchor: 'end', align: 'top', offset: 4, font: { weight: 'bold', size: 16 },
                    color: (ctx) => ctx.datasetIndex === 0 ? azul : '#ffffff',
                    formatter: (v, ctx) => (ctx.datasetIndex === 1 && v === 0) ? '' : (v===0 ? '' : Math.round(v))
                }
            }
        }
    });

    // ================= FUNÇÃO CENTRAL DE ATUALIZAÇÃO DA TELA =================
    function atualizarDashboard() {
        // Decide quais variáveis usar baseando-se na marca atual
        const metaAtual = currentBrand === 'ZH' ? metaTotal_zh : metaTotal_bsk;
        const backlogAtual = currentBrand === 'ZH' ? backlog_zh : backlog_bsk;
        const realizadoAtual = currentBrand === 'ZH' ? realizado_zh : realizado_bsk;

        // Atualiza Título Visual
        const titleElement = document.getElementById('dashboard-title');
        if (currentBrand === 'ZH') {
            titleElement.innerText = "PAINEL LOGÍSTICO - ZARA HOME";
            titleElement.style.color = "#ffffff";
        } else {
            titleElement.innerText = "PAINEL LOGÍSTICO - BERSHKA";
            titleElement.style.color = "#E040FB"; // Um tom diferente para Bershka destacar a troca
        }

        const totalRealizado = realizadoAtual.reduce((a,b) => a+b, 0);

        // Atualiza Textos
        document.getElementById('real').innerText = totalRealizado;
        document.getElementById('meta').innerText = "/ " + metaAtual;
        document.getElementById('backlog').innerText = backlogAtual;

        // Atualiza Prod
        let restante = Math.max(0, metaAtual - totalRealizado);
        if(metaAtual === 0 && totalRealizado === 0) restante = 1;
        chartProd.data.datasets[0].data = [totalRealizado, restante];
        chartProd.data.datasets[0].backgroundColor = [verde, cinza];
        chartProd.update();

        // Atualiza Peças Pendentes
        chartBacklog.data.datasets[0].data = [backlogAtual, backlogAtual === 0 ? 1 : 0];
        chartBacklog.data.datasets[0].backgroundColor = [branco, cinza];
        chartBacklog.update();

        // -------------------------------------------------------------
        // CÁLCULOS POR TURNO E HORÁRIO
        // -------------------------------------------------------------
        // Calcula as metas horárias atuais baseada na distribuição % e na meta da marca
        const metasAtuaisArray = horasChaves.map(h => metaAtual * (distribuicaoPercentual[h] || 0));

        const metaT1 = metasAtuaisArray.slice(0, 8).reduce((a,b)=>a+b,0);
        const realT1 = realizadoAtual.slice(0, 8).reduce((a,b)=>a+b,0);
        const metaT2 = metasAtuaisArray.slice(8, 16).reduce((a,b)=>a+b,0);
        const realT2 = realizadoAtual.slice(8, 16).reduce((a,b)=>a+b,0);

        const horaAtual = new Date().getHours();
        const t1Ativo = horaAtual >= 6 && horaAtual < 14;
        const t1Passado = horaAtual >= 14;
        const t2Ativo = horaAtual >= 14 && horaAtual < 22;
        const t2Passado = horaAtual >= 22;

        function getCorTurno(real, meta, isAtivo, isPassado) {
            if (meta === 0 && real === 0) return cinza;
            if (real >= meta && meta > 0) return verde;
            if (isAtivo) return amarelo;
            if (isPassado) return vermelho;
            return cinza;
        }

        chartTurnos.data.datasets[0].data = [metaT1, metaT2];
        chartTurnos.data.datasets[1].data = [realT1, realT2];
        chartTurnos.data.datasets[1].backgroundColor = [
            getCorTurno(realT1, metaT1, t1Ativo, t1Passado),
            getCorTurno(realT2, metaT2, t2Ativo, t2Passado)
        ];
        chartTurnos.update();

        // Atualiza Horas
        const coresRealizado = realizadoAtual.map((v, i) => {
            if (v === 0) return cinza;
            return v >= metasAtuaisArray[i] ? verde : vermelho;
        });

        const ultimaHoraAtiva = realizadoAtual.findLastIndex(v => v > 0);
        chartHoras.options.plugins.datalabels.formatter = (v, ctx) => {
            if (ctx.datasetIndex === 1 && v === 0) return '';
            if (ctx.datasetIndex === 0 && ctx.dataIndex > (ultimaHoraAtiva + 1)) return '';
            return Math.round(v);
        };

        chartHoras.data.labels = horasChaves;
        chartHoras.data.datasets[0].data = metasAtuaisArray;
        chartHoras.data.datasets[1].data = realizadoAtual;
        chartHoras.data.datasets[1].backgroundColor = coresRealizado;
        chartHoras.update();

        // Remove o Modal e Blur se qualquer dado existir
        if(metaTotal_zh > 0 || metaTotal_bsk > 0 || Object.keys(dadosArquivosCsv).length > 0) {
            document.getElementById('setupModal').classList.add('hidden');
            document.getElementById('dashboard-root').classList.remove('blur-bg');
            document.getElementById('controlPanel').classList.remove('hidden');
        }
    }

    // Primeira renderização
    atualizarDashboard();
    document.getElementById('controlPanel').classList.add('hidden');

    // ================= CARROSSEL (1 EM 1 MINUTO) =================
    setInterval(() => {
        // Só faz a troca se tivermos dados reais rodando para não ficar piscando à toa no início
        if (metaTotal_zh > 0 || metaTotal_bsk > 0 || Object.keys(dadosArquivosCsv).length > 0) {
            currentBrand = currentBrand === 'ZH' ? 'BSK' : 'ZH';
            atualizarDashboard();
        }
    }, 60000); // 60000 ms = 1 minuto

    // ================= LÓGICA DE UPLOAD SEPARANDO AS MARCAS =================
    async function processarArquivos(e) {
        const files = e.target.files;
        if (!files.length) return;

        for (let file of files) {
            const texto = await file.text();
            const nomeArquivo = file.name.toLowerCase();

            if (nomeArquivo.endsWith('.json')) {
                try {
                    const data = JSON.parse(texto);
                    // Lendo as novas chaves do seu novo meta.json
                    if(data.metaTotalDia_zh !== undefined) metaTotal_zh = data.metaTotalDia_zh;
                    if(data.metaTotalDia_bsk !== undefined) metaTotal_bsk = data.metaTotalDia_bsk;
                    if(data.backlog_zh && data.backlog_zh.length) backlog_zh = data.backlog_zh[0];
                    if(data.backlog_bsk && data.backlog_bsk.length) backlog_bsk = data.backlog_bsk[0];

                    if(data.distribuicaoPercentual) {
                        horasChaves = Object.keys(data.distribuicaoPercentual);
                        distribuicaoPercentual = data.distribuicaoPercentual;
                    }
                } catch(err) { alert("Erro ao ler JSON: " + err); }
            }
            else if (nomeArquivo.endsWith('.csv')) {
                const limpo = texto.replace(/"/g, '');
                const linhas = limpo.trim().split(/\r?\n/);
                const cabecalho = linhas[0].split(';');

                dadosArquivosCsv[nomeArquivo] = new Array(horasChaves.length).fill(0);

                for (let i = 1; i < linhas.length; i++) {
                    const colunas = linhas[i].split(';');
                    horasChaves.forEach((hora, index) => {
                        const colIndex = cabecalho.indexOf(hora);
                        if (colIndex !== -1) {
                            dadosArquivosCsv[nomeArquivo][index] += parseInt(colunas[colIndex]) || 0;
                        }
                    });
                }
            }
        }

        // Reconstruindo as arrays baseando-se no nome dos arquivos salvos na memória
        realizado_zh = new Array(horasChaves.length).fill(0);
        realizado_bsk = new Array(horasChaves.length).fill(0);

        for (let arquivo in dadosArquivosCsv) {
            // Se o arquivo for zh- ou zsur-, soma na array da Zara Home
            if (arquivo.includes('zh-') || arquivo.includes('zsur-')) {
                for (let i = 0; i < horasChaves.length; i++) {
                    realizado_zh[i] += dadosArquivosCsv[arquivo][i];
                }
            }
            // Se for bsk-, soma na array da Bershka
            else if (arquivo.includes('bsk-')) {
                for (let i = 0; i < horasChaves.length; i++) {
                    realizado_bsk[i] += dadosArquivosCsv[arquivo][i];
                }
            }
        }

        atualizarDashboard();
        e.target.value = '';
    }

    document.getElementById('fileInputModal').addEventListener('change', processarArquivos);
    document.getElementById('fileInputHeader').addEventListener('change', processarArquivos);

    // ================= SCALE E FULLSCREEN =================
    function ajustarEscala(){
        const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        document.getElementById('dashboard-root').style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', ajustarEscala);
    window.addEventListener('load', ajustarEscala);

    function toggleFullscreen() {
        if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); }
        else { document.exitFullscreen(); }
    }
</script>

</body>
</html>
